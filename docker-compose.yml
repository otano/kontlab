services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kontlab
      POSTGRES_USER: kontlab
      POSTGRES_PASSWORD: kontlab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  garage:
    image: dxflrs/garage:v2.3.0
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: GKkontlab
      GARAGE_DEFAULT_SECRET_KEY: kontlab-secret-key-123
      GARAGE_DEFAULT_BUCKET: tmp-uploads
    volumes:
      - garage_data:/var/lib/garage
      - ./garage.toml:/etc/garage.toml:ro
    command: ["/garage", "server", "--single-node", "--default-bucket"]

  django:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: kontlab
      DB_USER: kontlab
      DB_PASSWORD: kontlab
      GARAGE_ENDPOINT: http://garage:3900
      GARAGE_ACCESS_KEY: GKkontlab
      GARAGE_SECRET_KEY: kontlab-secret-key-123
      GARAGE_BUCKET_TMP: tmp-uploads
      GARAGE_BUCKET_PERM: documents-permanents
      DJANGO_SECRET_KEY: dev-secret-key-change-in-production
      DJANGO_DEBUG: "True"
    depends_on:
      - db
      - garage
    volumes:
      - ./gestion_asso:/app
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

volumes:
  pgdata:
  garage_data:
