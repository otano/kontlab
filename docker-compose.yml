services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kontlab
      POSTGRES_USER: kontlab
      POSTGRES_PASSWORD: kontlab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  garage:
    image: dxflrs/garage:v2.3.0
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: GKkontlab
      GARAGE_DEFAULT_SECRET_KEY: kontlab-secret-key-123
      GARAGE_DEFAULT_BUCKET: tmp-uploads
    volumes:
      - garage_data:/var/lib/garage
      - ./garage.toml:/etc/garage.toml:ro
    command: ["/garage", "server", "--single-node", "--default-bucket"]

volumes:
  pgdata:
  garage_data:
